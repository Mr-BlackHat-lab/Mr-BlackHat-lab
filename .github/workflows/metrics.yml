name: Metrics
on:
  # Update automatically every 24 hours
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual triggering
  workflow_dispatch:
  # Update on every push to the master/main branch
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Base setup
          user: Mr-BlackHat-lab 
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata # Adjust to your timezone
          
          # Plugin: Most used languages
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Plugin: Recently starred repositories
          plugin_stars: yes
          plugin_stars_limit: 4
